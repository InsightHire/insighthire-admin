# After deploy to main, trigger cross-service E2E smoke tests.
name: Trigger E2E

on:
  push:
    branches: [main]

jobs:
  dispatch-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger insighthire-e2e
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.E2E_DISPATCH_TOKEN }}
          repository: tcast/insighthire-e2e
          event-type: deploy-complete
          client-payload: '{"service":"insighthire-admin"}'
